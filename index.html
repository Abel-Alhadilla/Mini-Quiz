<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>Quiz Time!</title>
</head>

<body>
    <!-- CONTAINER -->
    <div class="container">
        <!-- START SCREEN -->
        <div class="start screen active" id="start">
            <h1>Quiz Time!</h1>

            <div class="start-button-container">
                <p>Test Your Knowledge With Some Fun Question</p>

                <button class="start-button" id="start-button">
                    Start Quiz
                </button>
            </div>
        </div>
        <!-- QUIZ SCREEN -->
        <div class="time-score-info screen" id="time-score-info">
            <h4>Timer: <span class="timer" id="timer"></span></h4>
            <h4>High Score: <span class="highScore" id="highScore"></span></h4>
        </div>
        <div class="quiz screen" id="quiz">
            <!-- QUESTION -->
            <span class="question" id="question"></span>
            <!-- QUIZ INFO -->
            <div class="quiz-info">
                <span class="current-question" id="current-question"></span>

                <span class="score" id="score"></span>
            </div>
            <div class="answer-container" id="answer-container">
                <!-- Jawaban di sini -->
            </div>
            <!-- PROGRESS BAR -->
            <div class="progres-container">
                <div class="progres" id="progres"></div>
            </div>
        </div>
        <!-- RESULT SCREEN -->
        <div class="result screen" id="result">
            <div class="result-info">
                <span class="result-text" id="result-text"></span>
                <span class="score-text" id="score-text"></span>
            </div>

            <button class="restart-button" id="restart-button">
                Restart Quiz
            </button>
        </div>
    </div>

    <script src="script.js"></script>
</body>

</html>
